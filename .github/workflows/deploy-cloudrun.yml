name: Deploy to Cloud Run
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write GCP credentials file
        run: echo '${{ secrets.GCP_SA_KEY_B64 }}' | base64 -d > /tmp/gcp-key.json

      - name: Authenticate with GCP
        run: |
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project cmo-task-app

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy cmo-task-manager \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars "GMAIL_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }},GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gcp-key.json
